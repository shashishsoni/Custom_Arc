# Dependabot version updates + supply-chain alignment with pnpm 11.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Playbook (any ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION / lockfile policy failure):
#   1. Prefer waiting or pinning a mature version (security-preserving).
#   2. Trusted high-churn org scopes only → minimumReleaseAgeExclude in
#      pnpm-workspace.yaml (see scripts/lib/pnpm-age-policy.mjs).
#   3. Never set minimumReleaseAge: 0. Never exclude unknown packages by hand
#      without review — use `pnpm deps:repair-age` from the install log.
#   4. Commit pnpm-workspace.yaml + pnpm-lock.yaml together; regenerate with the
#      same pnpm major as package.json#packageManager.
#   5. Vercel uses `node scripts/pnpm-install-with-age-repair.mjs` (vercel.json)
#      so deploys auto-repair once; still commit the result to keep builds fast.
#   6. Security updates ignore cooldown and should still merge promptly after CI.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Stay ahead of pnpm's 1440-minute gate for routine version bumps.
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
      # High-churn org scopes already (or auto) excluded from the age gate.
      exclude:
        - "@aws-sdk/*"
        - "@aws-crypto/*"
        - "@aws/*"
        - "@smithy/*"
        - "@google-cloud/*"
        - "@grpc/*"
        - "@opentelemetry/*"
        - "@azure/*"
        - "@azure-rest/*"
        - "@microsoft/*"
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@aws-crypto/*"
          - "@aws/*"
          - "@smithy/*"
      google-cloud:
        patterns:
          - "@google-cloud/*"
          - "@grpc/*"
      azure-sdk:
        patterns:
          - "@azure/*"
          - "@azure-rest/*"
          - "@microsoft/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      production-deps:
        dependency-type: "production"
        exclude-patterns:
          - "@aws-sdk/*"
          - "@aws-crypto/*"
          - "@aws/*"
          - "@smithy/*"
          - "@google-cloud/*"
          - "@grpc/*"
          - "@opentelemetry/*"
          - "@azure/*"
          - "@azure-rest/*"
          - "@microsoft/*"
      dev-deps:
        dependency-type: "development"
        exclude-patterns:
          - "@aws-sdk/*"
          - "@aws-crypto/*"
          - "@aws/*"
          - "@smithy/*"
          - "@google-cloud/*"
          - "@grpc/*"
          - "@opentelemetry/*"
          - "@azure/*"
          - "@azure-rest/*"
          - "@microsoft/*"
    ignore:
      # Next 16 stable can't use TS 7's native-only package layout (build worker
      # crashes — vercel/next.js#95400). Stay on the 6.x line until Next ships support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
