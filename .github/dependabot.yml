# Dependabot version updates. Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Install is plain `pnpm install` (no age-repair scripts).
# Security: Dependabot updates + CI `pnpm audit --prod` in deps-guard.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 3
      exclude:
        - "@aws-sdk/*"
        - "@aws-crypto/*"
        - "@aws/*"
        - "@smithy/*"
        - "@google-cloud/*"
        - "@grpc/*"
        - "@opentelemetry/*"
        - "@azure/*"
        - "@azure-rest/*"
        - "@microsoft/*"
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@aws-crypto/*"
          - "@aws/*"
          - "@smithy/*"
      google-cloud:
        patterns:
          - "@google-cloud/*"
          - "@grpc/*"
      azure-sdk:
        patterns:
          - "@azure/*"
          - "@azure-rest/*"
          - "@microsoft/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      production-deps:
        dependency-type: "production"
        exclude-patterns:
          - "@aws-sdk/*"
          - "@aws-crypto/*"
          - "@aws/*"
          - "@smithy/*"
          - "@google-cloud/*"
          - "@grpc/*"
          - "@opentelemetry/*"
          - "@azure/*"
          - "@azure-rest/*"
          - "@microsoft/*"
      dev-deps:
        dependency-type: "development"
        exclude-patterns:
          - "@aws-sdk/*"
          - "@aws-crypto/*"
          - "@aws/*"
          - "@smithy/*"
          - "@google-cloud/*"
          - "@grpc/*"
          - "@opentelemetry/*"
          - "@azure/*"
          - "@azure-rest/*"
          - "@microsoft/*"
    ignore:
      # Next 16 stable can't use TS 7's native-only package layout (build worker
      # crashes — vercel/next.js#95400). Stay on the 6.x line until Next ships support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
