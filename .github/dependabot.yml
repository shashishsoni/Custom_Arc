# Dependabot version updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # pnpm workspace — the root manifest covers apps/* and packages/*.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      production-deps:
        dependency-type: "production"
      dev-deps:
        dependency-type: "development"
    ignore:
      # Next 16 stable can't use TS 7's native-only package layout (build worker
      # crashes — vercel/next.js#95400). Stay on the 6.x line until Next ships support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Local dev Postgres image pinned in docker-compose.yml.
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
