# Verify install + production audit before merge / deploy.
# Dependabot handles version updates; this job only checks install + audit.
name: deps-guard

on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "**/package.json"
      - ".github/workflows/deps-guard.yml"
  push:
    branches: [main, master]
    paths:
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "**/package.json"

concurrency:
  group: deps-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm from packageManager)
        run: corepack enable

      - name: Install
        run: pnpm install

      - name: Production vulnerability audit
        run: pnpm audit --prod --audit-level=high
