# Verify install + supply-chain policy before merge / deploy.
# Security: keeps minimumReleaseAge; auto-repair never disables the gate.
name: deps-guard

on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "**/package.json"
      - "scripts/pnpm-install-with-age-repair.mjs"
      - "scripts/repair-pnpm-release-age.mjs"
      - "scripts/lib/pnpm-age-policy.mjs"
      - ".github/workflows/deps-guard.yml"
  push:
    branches: [main, master]
    paths:
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "**/package.json"

concurrency:
  group: deps-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm from packageManager)
        run: corepack enable

      - name: Install (with age-gate auto-repair)
        run: node scripts/pnpm-install-with-age-repair.mjs

      - name: Detect uncommitted policy/lockfile repair
        run: |
          if [ -n "$(git status --porcelain pnpm-workspace.yaml pnpm-lock.yaml)" ]; then
            echo "::error::Install repair mutated pnpm-workspace.yaml and/or pnpm-lock.yaml."
            echo "Commit those files so Vercel does not rely on ephemeral repair."
            git --no-pager diff -- pnpm-workspace.yaml pnpm-lock.yaml
            exit 1
          fi

      - name: Production vulnerability audit
        run: pnpm audit --prod --audit-level=high
