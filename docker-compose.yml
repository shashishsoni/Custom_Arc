services:
  postgres:
    image: postgres:18-alpine
    container_name: customarc-postgres
    environment:
      POSTGRES_USER: customarc
      POSTGRES_PASSWORD: customarc
      POSTGRES_DB: customarc
    ports:
      - "5432:5432"
    volumes:
      - customarc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customarc -d customarc"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  customarc_pgdata:
